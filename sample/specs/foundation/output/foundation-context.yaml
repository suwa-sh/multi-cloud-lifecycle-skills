# ====================================================================
# 下位スキル（shared-platform, product）が参照するコンテキスト
# ====================================================================

organization_structure:
  target_clouds:
    - vendor: "aws"
      scope: "full_stack"
    - vendor: "azure"
      scope: "idp_only"
    - vendor: "gcp"
      scope: "bigquery_only"
  business_units:
    - id: "ccoe"
      name: "CCoE"
      role: "基盤管理・ガバナンス"
    - id: "marketing"
      name: "マーケティング"
    - id: "sales"
      name: "営業"
    - id: "development"
      name: "開発"
    - id: "customer-success"
      name: "カスタマーサクセス"
    - id: "accounting"
      name: "経理"
    - id: "general-affairs"
      name: "総務"
    - id: "executive"
      name: "経営"
  environments:
    - id: "production"
      name: "本番"
    - id: "staging"
      name: "ステージング"
    - id: "development"
      name: "開発"
  aws_account_naming: "{bu}-{env}"
  aws_ou_structure:
    security: ["log-archive", "security-tooling"]
    infrastructure: ["network-hub", "shared-services"]
    workloads: "BU ごとの子 OU に環境別アカウント"
    sandbox: ["sandbox"]

identity_guardrails:
  idp: "Azure Entra ID（唯一の IdP）"
  federation: "SAML 2.0 → AWS IAM Identity Center"
  provisioning: "SCIM（Entra ID → IAM Identity Center）"
  local_iam_users: "禁止（ブレークグラス除く）"
  mfa: "全ユーザー必須"
  privileged_access: "JIT（Entra ID PIM 経由、最大 8 時間）"
  break_glass: "管理アカウントに IAM ユーザー × 2（ハードウェア MFA）"
  permission_sets:
    - name: "AdministratorAccess"
      scope: "CCoE JIT のみ"
    - name: "PowerUserAccess"
      scope: "開発者（開発・ステージング環境）"
    - name: "ReadOnlyAccess"
      scope: "全 BU（本番環境デフォルト）"
    - name: "BillingAccess"
      scope: "経理"

network_guardrails:
  topology: "ハブ&スポーク（Transit Gateway）"
  hub_account: "network-hub"
  cidr_plan:
    shared_services: "10.0.0.0/16"
    workload_pattern: "10.{bu_id}.{env_id}0.0/20"
  environment_isolation: "TGW ルートテーブルで本番/非本番を分離"
  egress: "共有 NAT Gateway（network-hub アカウント）"
  dns: "Route 53 Private Hosted Zone（internal.example.com）"
  allowed_regions: ["ap-northeast-1", "us-east-1"]
  azure_network: "なし（IdP 専用のためスコープ外）"

policy_guardrails:
  aws_scps:
    - "リージョン制限（ap-northeast-1, us-east-1）"
    - "root ユーザー操作制限"
    - "必須タグ強制（cost-center, environment, owner）"
    - "CloudTrail 無効化禁止"
    - "S3 パブリックアクセスブロック解除禁止"
    - "ローカル IAM ユーザー作成禁止"
  aws_config_rules:
    - "required-tags"
    - "encrypted-volumes"
    - "s3-bucket-server-side-encryption-enabled"
    - "rds-storage-encrypted"
    - "cloudtrail-enabled"
    - "iam-user-no-policies-check"
  azure_policies:
    - "条件付きアクセス: MFA 必須"
    - "条件付きアクセス: 高リスクサインインブロック"
  compliance: "SOC2 Type II"

logging_guardrails:
  cloudtrail: "組織トレイル（全アカウント・全リージョン）"
  log_destination: "log-archive アカウントの S3"
  retention: "365 日（S3）→ Glacier Deep Archive（365 日以降）"
  tamper_protection: "S3 Object Lock（Governance モード）"
  config_recording: "全アカウント・全リソース"
  entra_id_logs: "監査ログ・サインインログを AWS S3 にエクスポート"
  gcp_audit_logs: "Cloud Audit Logs（Admin Activity + Data Access for BigQuery）→ Cloud Storage → AWS S3 二重保管"
  vpc_flow_logs: "全 VPC で有効化"

billing_boundaries:
  responsibility: "BU 単位"
  allocation_model: "固定＋変動ハイブリッド"
  fixed_allocation: "基盤固定費 → 8 BU 均等割"
  variable_allocation: "変動費 → 利用量比例（cost-center タグベース）"
  required_tags:
    - key: "cost-center"
      values: ["ccoe", "marketing", "sales", "development", "customer-success", "accounting", "general-affairs", "executive"]
    - key: "environment"
      values: ["production", "staging", "development"]
    - key: "owner"
      values: "自由入力"
  azure_cost: "Entra ID ライセンス費用は全社共有コストとして一括管理"
  gcp_cost: "BigQuery 利用料は全社共有の分析基盤コストとして按分。ラベル cost-center で BU 帰属"
  budget_alerts: "BU × 環境ごと（80%, 100%, 120% 閾値）"

gcp_guardrails:
  scope: "BigQuery 専用（データ分析のみ）"
  identity: "Entra ID → Cloud Identity SAML フェデレーション"
  project_structure: "analytics フォルダ配下に環境別 3 プロジェクト"
  org_policies:
    - "リソースロケーション制限（asia-northeast1）"
    - "サービスアカウントキー作成禁止"
    - "デフォルト VPC 作成スキップ"
    - "IAM ポリシーメンバードメイン制限"
  vpc_service_controls: "BigQuery + Cloud Storage をサービスペリメータで保護"
  audit: "Cloud Audit Logs → Cloud Storage → AWS S3 二重保管"
  security: "Security Command Center Standard"
  data_ingestion:
    from_aws: "Workload Identity Federation 経由のバッチ連携"
    from_saas: "専用サービスアカウント経由の直接連携"

approved_deviations: []
