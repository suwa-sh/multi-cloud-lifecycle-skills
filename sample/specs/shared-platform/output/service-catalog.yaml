  - id: "svc-artifact-registry"
    name: "アーティファクトレジストリ"
    category: "shared_artifact_management"
    mandatory: false
    description: "ECR コンテナイメージレジストリ。イメージスキャン付き"
    delivery_model: "self_service"
    dependencies: []
    included_features:
      - "テナント別 ECR リポジトリ"
      - "ライフサイクルポリシー（自動クリーンアップ）"
      - "Enhanced Scanning（Inspector 統合）"
      - "クロスアカウントプルアクセス"

  - id: "svc-secret-management"
    name: "シークレット管理"
