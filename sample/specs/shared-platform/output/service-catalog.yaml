      - "テナント分離（IAM ポリシー）"

  - id: "svc-tenant-onboarding"
    name: "テナントオンボーディング"
    category: "onboarding_model"
    mandatory: false
    description: "PR ベースのテナント登録。Namespace、RBAC、ArgoCD Project を自動生成"
    delivery_model: "request_based"
    dependencies:
      - "svc-eks-runtime"
      - "svc-delivery-pipeline"
    included_features:
      - "テナントテンプレート（Namespace + RBAC + ResourceQuota + NetworkPolicy）"
      - "ArgoCD AppProject 自動作成"
      - "リードタイム 1 営業日以内"
