schema_version: "1.0"
artifact_type: "context"
skill_type: "shared_platform"
artifact_id: "shared-platform-context"
title: "共有プラットフォーム コンテキスト（product スキル向け）"
status: "draft"
generated_at: "2026-03-28T00:00:00+09:00"
source_refs:
  - "shared-platform-canonical"
  - "shared-platform-mapping-aws"
decision_refs:
  - "shared-platform-decision-hybrid-runtime"
  - "shared-platform-decision-gitops"
inputs_ref:
  - "shared-platform-input"
  - "foundation-context"

available_shared_services:
  - id: "svc-eks-runtime"
    name: "EKS 共有ランタイム"
    mandatory: true
  - id: "svc-lambda-runtime"
    name: "Lambda サーバーレスランタイム"
    mandatory: true
  - id: "svc-observability"
    name: "統合オブザーバビリティ"
    mandatory: true
  - id: "svc-delivery-pipeline"
    name: "CI/CD パイプライン"
    mandatory: true
  - id: "svc-artifact-registry"
    name: "アーティファクトレジストリ"
    mandatory: false
  - id: "svc-secret-management"
    name: "シークレット管理"
    mandatory: false
  - id: "svc-tenant-onboarding"
    name: "テナントオンボーディング"
    mandatory: false

mandatory_services: ["svc-eks-runtime", "svc-lambda-runtime", "svc-observability", "svc-delivery-pipeline"]
optional_services: ["svc-artifact-registry", "svc-secret-management", "svc-tenant-onboarding"]

runtime_options:
  kubernetes:
    service: "Amazon EKS"
    version: "1.30+"
    cluster_per_env: true
    node_management: "Managed Node Groups + Karpenter"
    pod_identity: "EKS Pod Identity"
    tenant_isolation: "Namespace"
  serverless:
    service: "AWS Lambda"
    vpc_placement: true
    vpc: "shared-services VPC"

observability_standards:
  metrics:
    service: "Amazon Managed Prometheus"
    collection: "ADOT Collector（DaemonSet）"
    retention_days: 150
  visualization:
    service: "Amazon Managed Grafana"
    auth: "Entra ID SAML SSO"
  logs:
    service: "CloudWatch Logs"
    format: "構造化 JSON"
    retention_days: 90
    archive: "S3 エクスポート"
  traces:
    service: "AWS X-Ray"
    collection: "ADOT Collector"
  alerting:
    templates: "標準アラートルール（CPU/メモリ/Pod再起動/エラーレート）"

delivery_standards:
  ci:
    tool: "GitHub Actions"
    templates: "Reusable Workflows"
    auth: "OIDC Federation（GitHub → AWS IAM Role）"
    security_scan: "Trivy（コンテナ）、Checkov（IaC）"
  cd:
    tool: "ArgoCD"
    model: "GitOps"
    sync_policy:
      development: "auto"
      staging: "manual"
      production: "pr_approval + manual"
    tenant_isolation: "AppProject per tenant"

secrets_and_cert_standards:
  secrets:
    store: "AWS Secrets Manager"
    k8s_integration: "External Secrets Operator"
    encryption: "KMS CMK"
    tenant_isolation: "IAM ポリシー + プレフィックス分離"
  certificates:
    service: "AWS Certificate Manager"
    auto_renewal: true

platform_operating_constraints:
  owner: "CCoE"
  sla:
    availability: "99.9%"
    incident_response: "15 分以内"
  change_management: "CAB レビュー → ArgoCD Sync"
  onboarding:
    method: "PR ベース（Git リポジトリ）"
    lead_time: "1 営業日以内"
    includes: ["Namespace", "RBAC", "ResourceQuota", "LimitRange", "NetworkPolicy", "ArgoCD AppProject"]
  tenant_resources:
    namespace_pattern: "{tenant}-{env}"
    ecr_repo_pattern: "{tenant}/{app-name}"
    secret_prefix: "/{tenant}/"
