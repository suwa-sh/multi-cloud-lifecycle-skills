schema_version: "1.0"
artifact_type: "canonical_model"
skill_type: "shared_platform"
artifact_id: "shared-platform-canonical"
title: "共有プラットフォームレイヤー Canonical Model"
status: "draft"
generated_at: "2026-03-28T00:00:00+09:00"
source_refs:
